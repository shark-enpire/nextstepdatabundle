<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextStep Data Bundles</title>

<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container { padding: 20px; }

input, select, button {
    padding: 10px;
    margin: 10px;
    width: 80%;
    border-radius: 8px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

/* The spinning animation */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid #ffffff;
  border-radius: 50%;
  border-top-color: transparent;
  animation: spin 1s linear infinite;
  margin-right: 8px;
}

button:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
    opacity: 0.7;
}


</style>
</head>
<body>

<div class="max-w-md mx-auto px-4">

<div class="container">
    <h2>Buy Data Bundles</h2>

    <select id="network">
        <option value="">All Networks</option>
        <option>MTN</option>
        <option>Vodafone</option>
        <option>AirtelTigo</option>
    </select>

    <select id="bundle">
        <!-- Bundles will populate here -->
    </select>

    <input type="text" id="phone" placeholder="Enter Phone Number">

    <button onclick="buyData()">Buy Now</button>
</div>

<footer>

<p>nextstep data bundles copyright 2026<sup>&#169</sup></p>
</footer>

<script>
// ------------------- Supabase Setup -------------------
const supabaseClient = supabase.createClient(
    "https://zhinkuoqxsmotnbsjdue.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoaW5rdW9xeHNtb3RuYnNqZHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTc1MzIsImV4cCI6MjA4Nzk3MzUzMn0.Kw5BDJDH9WOAiE3a-P6ylQiseErYG-mHCFi5fgamnUY"
);

// ------------------- Load Bundles -------------------
let allBundles = [];

document.addEventListener("DOMContentLoaded", () => {
    loadBundles();

    document.getElementById('network').addEventListener('change', () => {
        const network = document.getElementById('network').value;
        if (!network) populateBundles(allBundles);
        else populateBundles(allBundles.filter(b => b.network === network));
    });
});

async function loadBundles() {
    const { data, error } = await supabaseClient.from('bundles').select('*');
    if (error) {
        alert("Error loading bundles: " + error.message);
        return;
    }
    allBundles = data;
    populateBundles(data);
}

function populateBundles(data) {
    const bundleSelect = document.getElementById('bundle');
    let html = '<option value="" disabled selected>Select a data bundle</option>';
    data.forEach(item => {
        html += `
            <option value="${item.id}" data-price="${item.price}" data-name="${item.network} ${item.size}">
                ${item.network} ${item.size} - GH₵${item.price}
            </option>
        `;
    });
    bundleSelect.innerHTML = html;
}

// ------------------- Buy Data -------------------

async function buyData() {
    const btn = document.querySelector('button[onclick="buyData()"]'); 
    const phone = document.getElementById('phone').value;
    const bundleId = document.getElementById('bundle').value;

    if (!phone || !bundleId) { alert("Please fill all fields"); return; }

    const bundle = allBundles.find(b => b.id == Number(bundleId));
    if (!bundle) return;

    // Loading State
    const originalBtnText = btn.innerText;
    btn.disabled = true;
    btn.innerHTML = 'Processing...';

    // PAYSTACK SETUP

    let handler = PaystackPop.setup({
        key: 'pk_live_68410a36c97591a8e61aa8fc998b9e39cf51b92f', 
        email: phone + '@nextstepdata.com', 
        amount: bundle.price * 100, 
        currency: "GHS",
        ref: 'DATA-' + phone + '-' + Date.now(),
        metadata: {
            custom_fields: [
                { display_name: "Bundle ID", variable_name: "bundle_id", value: bundle.id }
            ]
        },
        // THIS IS THE CALLBACK PAYSTACK IS LOOKING FOR
     callback: async function(response) { 
    btn.disabled = false;
    btn.innerText = originalBtnText;

    try {
        await fetch("https://hook.us2.make.com/pfjsqrsfwoavl4rymqn3vvi2johjh6v8", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                reference: response.reference,
                phone: phone,
                bundle_id: bundle.id
            })
        });
        // Only redirect if the webhook ping was successful
        window.location.href = "success.html?ref=" + response.reference;
    } catch (err) {
        console.error("Make.com Error:", err);
        alert("Payment successful, but we had trouble updating the system. Please screenshot your receipt!");
    }
},

        onClose: () => {
            btn.disabled = false;
            btn.innerText = "Try Again";
        }
    });

    handler.openIframe();
}
</script>

 </div>

</body>
</html>
