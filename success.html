<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Status</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 50px;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    display: inline-block;
}

.spinner {
    border: 4px solid #ccc;
    border-top: 4px solid #22c55e;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
    <h2 id="status">⏳ Verifying payment...</h2>
    <div class="spinner" id="loader"></div>
    <p id="message"> We are confirming your payment securely... </p>
</div>
 

<script>
// 1. Supabase setup
const supabaseClient = window.supabase.createClient(
    "https://zhinkuoqxsmotnbsjdue.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoaW5rdW9xeHNtb3RuYnNqZHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTc1MzIsImV4cCI6MjA4Nzk3MzUzMn0.Kw5BDJDH9WOAiE3a-P6ylQiseErYG-mHCFi5fgamnUY"
);

// 2. Get reference from URL
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

// 3. Logic Variables
let attempts = 0;
const maxAttempts = 20; 

// 4. The main function (Updated with Error Handling)
async function checkPayment() {
    if (!ref) {
        showError("No payment reference found in the URL.");
        return; 
    }

    attempts++;

    if (attempts > maxAttempts) {
        showError("Verification timed out. Please refresh or contact support.");
        return;
    }

    try {
        // Query the database
        const { data, error } = await supabaseClient
            .from("transactions")
            .select("status, phone, bundle_id") 
            .eq("paystack_ref", ref)
            .maybeSingle();

        if (error) throw error;

        // If data is null, the row hasn't been created by Make.com yet
        if (!data) {
            console.log(`Attempt ${attempts}/${maxAttempts}: Waiting for record...`);
            setTimeout(checkPayment, 3000);
            return;
        }

        // Final status verification
        const currentStatus = data.status?.toLowerCase();

        if (currentStatus === "paid") {
            showSuccess(data);
        } else if (currentStatus === "failed") {
            showError("Payment failed. Please check your bank or try again.");
        } else {
            // If status is 'pending' or anything else, keep polling
            console.log(`Status is ${currentStatus}. Retrying...`);
            setTimeout(checkPayment, 3000);
        }

    } catch (err) {
        console.error("Connection Error:", err.message);
        showError("Connection issue. Still trying to verify...");
        setTimeout(checkPayment, 5000); // Wait slightly longer if there's a network glitch
    }
}

// 5. UI Helper Functions

function showSuccess(data) {
    document.getElementById("status").innerText = "✅ Payment Successful!";
    document.getElementById("loader").style.display = "none";
    document.getElementById("message").innerHTML = `
        Your bundle is being processed.<br><br>
        📱 ${data.phone}<br>
        📦 Bundle ID: ${data.bundle_id}<br><br>
        <button onclick="window.location.href='index.html'" style="padding:10px 20px; background:#22c55e; color:white; border:none; border-radius:5px; cursor:pointer;">
            Buy Another Bundle
        </button>
    `;
    
    // Remove the automatic setTimeout redirect or make it longer (e.g., 10 seconds)
}

function showError(msg) {
    document.getElementById("status").innerText = "❌ Failed";
    document.getElementById("loader").style.display = "none";
    document.getElementById("message").innerText = msg;
}

// 6. Start the loop
checkPayment();
</script>


</body>
</html>
