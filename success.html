<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Status</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 50px;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    display: inline-block;
}

.spinner {
    border: 4px solid #ccc;
    border-top: 4px solid #22c55e;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
    <h2 id="status">⏳ Verifying payment...</h2>
    <div class="spinner" id="loader"></div>
    <p id="message">Please wait...</p>
</div>
 

<script>
// 1. Supabase setup
const supabase = window.supabase.createClient(
    "https://zhinkuoqxsmotnbsjdue.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoaW5rdW9xeHNtb3RuYnNqZHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTc1MzIsImV4cCI6MjA4Nzk3MzUzMn0.Kw5BDJDH9WOAiE3a-P6ylQiseErYG-mHCFi5fgamnUY"
);

// 2. Get reference from URL
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

// 3. Logic Variables
let attempts = 0;
const maxAttempts = 20; // Stop after 1 minute (20 tries * 3 seconds)

// 4. The main function (PASTE REPLACEMENT HERE)
async function checkPayment() {
    attempts++;
    
    if (!ref) {
        showError("No reference found in URL");
        return;
    }

    if (attempts > maxAttempts) {
        showError("Verification timed out. Please refresh or contact support.");
        return;
    }

    const { data, error } = await supabase
        .from("transactions")
        .select("status, phone, bundle_id") 
        .eq("paystack_ref", ref)
        .maybeSingle(); 

    // If data is null, it means Make.com hasn't created the row yet
    if (!data) {
        console.log("Still waiting for database record... Attempt: " + attempts);
        setTimeout(checkPayment, 3000);
        return;
    }

    // Check the status value
    if (data.status.toLowerCase() === "paid") {
        showSuccess(data);
    } else {
        showError("Payment not successful. Status: " + data.status);
    }
}

// 5. UI Helper Functions
function showSuccess(data) {
    document.getElementById("status").innerText = "✅ Payment Successful!";
    document.getElementById("loader").style.display = "none";
    document.getElementById("message").innerHTML = `
        Your bundle is being processed.<br><br>
        📱 ${data.phone}<br>
        📦 Bundle ID: ${data.bundle_id}
    `;
}

function showError(msg) {
    document.getElementById("status").innerText = "❌ Failed";
    document.getElementById("loader").style.display = "none";
    document.getElementById("message").innerText = msg;
}

// 6. Start the loop
checkPayment();
</script>


</body>
</html>
