<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Status</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent: #10b981; /* Emerald 500 */
    }

    body {
        font-family: 'Inter', -apple-system, sans-serif;
        /* Dynamic mesh gradient background */
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        background-attachment: fixed;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      background-image: url('https://i.postimg.cc/nzgZw571/IMG-0622.png');;
    }

    .card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px); /* The "Glass" effect */
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        padding: 40px;
        border-radius: 24px;
        max-width: 400px;
        width: 100%;
        text-align: center;
    }

    h2 {
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 24px;
    }

    #message {
        color: #94a3b8;
        line-height: 1.6;
    }

    /* Modern Minimal Spinner */
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(16, 185, 129, 0.1);
        border-radius: 50%;
        border-top-color: var(--accent);
        animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        margin: 24px auto;
    }

    .btn {
        margin-top: 20px;
        padding: 12px 24px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
        background: #059669;
        transform: translateY(-1px);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>

<body>

<div class="card">
    <h2 id="status">Verifying Payment</h2>
    <div class="spinner" id="loader"></div>
    <p id="message">Please wait while we confirm your transaction securely.</p>
</div>

<script>
const supabaseClient = window.supabase.createClient(
    "https://zhinkuoqxsmotnbsjdue.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoaW5rdW9xeHNtb3RuYnNqZHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTc1MzIsImV4cCI6MjA4Nzk3MzUzMn0.Kw5BDJDH9WOAiE3a-P6ylQiseErYG-mHCFi5fgamnUY"
);

const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

let attempts = 0;
const maxAttempts = 20; 

async function checkPayment() {
    if (!ref) {
        showError("No payment reference found.");
        return; 
    }

    attempts++;
    if (attempts > maxAttempts) {
        showError("Timed out. Please contact support.");
        return;
    }

    try {
        const { data, error } = await supabaseClient
            .from("transactions")
            .select("status, phone, bundle_id") 
            .eq("paystack_ref", ref)
            .maybeSingle();

        if (error) throw error;

        if (!data) {
            setTimeout(checkPayment, 3000);
            return;
        }

        const currentStatus = data.status?.toLowerCase();

        if (currentStatus === "paid") {
            showSuccess(data);
        } else if (currentStatus === "failed") {
            showError("Payment failed. Please try again.");
        } else {
            setTimeout(checkPayment, 3000);
        }

    } catch (err) {
        console.error("Connection Error:", err.message);
        setTimeout(checkPayment, 5000);
    }
}

function showSuccess(data) {
    document.getElementById("status").innerText = "Success!";
    document.getElementById("loader").style.display = "none";
    document.getElementById("message").innerHTML = `
        Your bundle is being processed.<br><br>
        <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: left; font-size: 0.9em;">
            <strong>Phone:</strong> ${data.phone}<br>
            <strong>Bundle:</strong> ${data.bundle_id}
        </div>
        <button class="btn" onclick="window.location.href='index.html'">
            Buy Another Bundle
        </button>
    `;
}

function showError(msg) {
    document.getElementById("status").innerText = "Payment Error";
    document.getElementById("status").style.color = "#ef4444";
    document.getElementById("loader").style.display = "none";
    document.getElementById("message").innerText = msg;
}

checkPayment();
</script>

</body>
</html>
